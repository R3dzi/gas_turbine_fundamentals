<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inside the Engine – Nauka systemów silnika turbinowego</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --border: #e5e7eb;
            --border-light: #f3f4f6;
            --success: #10b981;
            --success-bg: #ecfdf5;
            --card-bg: #ffffff;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
            --shadow-hover: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image:
                linear-gradient(rgba(229, 231, 235, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(229, 231, 235, 0.3) 1px, transparent 1px);
            background-size: 24px 24px;
            line-height: 1.6;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        /* === HEADER === */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            background: var(--accent-light);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(37, 99, 235, 0.12);
        }

        .logo-icon svg {
            width: 28px;
            height: 28px;
            color: var(--accent);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            color: var(--text);
        }

        .header .subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* === GLOBAL PROGRESS === */
        .global-progress {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
            box-shadow: var(--shadow);
            transition: box-shadow 0.2s ease;
        }

        .global-progress:hover {
            box-shadow: var(--shadow-hover);
        }

        .global-progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .global-progress-label {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .global-progress-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border-light);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 99px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* === COURSE CARDS === */
        .courses-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .course-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 18px;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .course-card:hover {
            box-shadow: var(--shadow-hover);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .course-card:active {
            transform: translateY(0);
        }

        .course-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 22px;
        }

        .course-icon.oil      { background: #fff7ed; border: 1px solid #fed7aa; }
        .course-icon.fuel     { background: #fef2f2; border: 1px solid #fecaca; }
        .course-icon.starting { background: #f0fdf4; border: 1px solid #bbf7d0; }
        .course-icon.ignition { background: #fffbeb; border: 1px solid #fde68a; }
        .course-icon.fadec    { background: #eff6ff; border: 1px solid #bfdbfe; }

        .course-info {
            flex: 1;
            min-width: 0;
        }

        .course-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.2px;
        }

        .course-desc {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .course-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            flex-shrink: 0;
        }

        .course-progress {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent);
        }

        .course-progress.done {
            color: var(--success);
        }

        .course-btn {
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .course-card:hover .course-btn {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .course-btn.primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .checkmark {
            width: 22px;
            height: 22px;
            background: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
        }

        /* === FOOTER === */
        .footer {
            text-align: center;
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid var(--border-light);
        }

        .footer p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* === RESPONSIVE === */
        @media (max-width: 480px) {
            .container {
                padding: 24px 16px;
            }
            .header h1 {
                font-size: 24px;
            }
            .course-card {
                padding: 18px;
                gap: 14px;
            }
            .course-icon {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
            </div>
            <h1>INSIDE THE ENGINE</h1>
            <p class="subtitle">Nauka systemów silnika turbinowego</p>
        </header>

        <!-- Global Progress -->
        <div class="global-progress">
            <div class="global-progress-header">
                <span class="global-progress-label">Całkowity postęp</span>
                <span class="global-progress-value" id="globalPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-bar-fill" id="globalBar" style="width: 0%"></div>
            </div>
        </div>

        <!-- Courses List -->
        <div class="courses-list" id="coursesList">
            <!-- Rendered by JS -->
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Inside the Engine – Aplikacja do nauki systemów silnika turbinowego</p>
        </footer>
    </div>

    <script>
        // === KONFIGURACJA KURSÓW ===
        const courses = [
            {
                id: 'oil',
                name: 'OLEJ',
                desc: 'Poznaj układ smarowania',
                icon: '🛢️',
                iconClass: 'oil'
            },
            {
                id: 'fuel',
                name: 'PALIWO',
                desc: 'Poznaj układ paliwowy',
                icon: '⛽',
                iconClass: 'fuel'
            },
            {
                id: 'starting',
                name: 'ROZRUCH',
                desc: 'Starter, APU, Air Turbine Starter',
                icon: '⚡',
                iconClass: 'starting'
            },
            {
                id: 'ignition',
                name: 'ZAPŁON',
                desc: 'Ignition System',
                icon: '🔥',
                iconClass: 'ignition'
            },
            {
                id: 'fadec',
                name: 'FADEC',
                desc: 'Sterowanie elektroniczne silnika',
                icon: '💻',
                iconClass: 'fadec'
            }
        ];

        // === POSTĘP (localStorage) ===
        function getProgress(courseId) {
            const data = localStorage.getItem(`progress_${courseId}`);
            return data ? parseInt(data, 10) : 0;
        }

        function setProgress(courseId, percent) {
            localStorage.setItem(`progress_${courseId}`, percent.toString());
            render();
        }

        function getGlobalProgress() {
            const total = courses.reduce((sum, c) => sum + getProgress(c.id), 0);
            return Math.round(total / courses.length);
        }

        // === RENDER ===
        function render() {
            const list = document.getElementById('coursesList');
            const globalPercent = getGlobalProgress();

            // Aktualizuj globalny pasek
            document.getElementById('globalPercent').textContent = globalPercent + '%';
            document.getElementById('globalBar').style.width = globalPercent + '%';

            // Renderuj karty kursów
            list.innerHTML = courses.map(course => {
                const progress = getProgress(course.id);
                const isDone = progress >= 100;
                const isStarted = progress > 0 && progress < 100;
                const isNew = progress === 0;

                let btnText, btnClass;
                if (isDone) {
                    btnText = 'Powtórz';
                    btnClass = '';
                } else if (isStarted) {
                    btnText = 'Kontynuuj';
                    btnClass = 'primary';
                } else {
                    btnText = 'Rozpocznij';
                    btnClass = '';
                }

                return `
                    <a href="learn.html?course=${course.id}" class="course-card">
                        <div class="course-icon ${course.iconClass}">${course.icon}</div>
                        <div class="course-info">
                            <div class="course-name">${course.name}</div>
                            <div class="course-desc">${course.desc}</div>
                        </div>
                        <div class="course-meta">
                            ${isDone
                                ? '<div class="checkmark">✓</div>'
                                : progress > 0
                                    ? `<div class="course-progress">${progress}%</div>`
                                    : ''
                            }
                            <div class="course-btn ${btnClass}">${btnText}</div>
                        </div>
                    </a>
                `;
            }).join('');
        }

        // === DEMO: Przycisk do resetu postępu (Ctrl+Shift+R) ===
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'R') {
                e.preventDefault();
                if (confirm('Zresetować cały postęp?')) {
                    courses.forEach(c => localStorage.removeItem(`progress_${c.id}`));
                    render();
                }
            }
        });

        // Inicjalizacja
        render();
    </script>
</body>
</html>
