<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Układ Rozruchowy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --color-bg: #ffffff;
            --color-surface: #fafafa;
            --color-text: #111111;
            --color-text-secondary: #444444;
            --color-text-muted: #777777;
            --color-border: #bbbbbb;
            --color-border-light: #e5e5e5;
            --color-accent: #2563EB;
            --color-accent-light: #eff6ff;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 10px;
            --transition-fast: 150ms ease-out;
            --transition-base: 200ms ease-out;
            --transition-slow: 250ms ease-out;
            --space-xs: 0.25rem;
            --space-sm: 0.5rem;
            --space-md: 1rem;
            --space-lg: 1.5rem;
            --space-xl: 2rem;
            --space-2xl: 3rem;
            --header-height: 60px;
            --footer-height: 120px;
            --max-width: 1200px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body {
            font-family: var(--font-family);
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(var(--color-border-light) 1px, transparent 1px),
                linear-gradient(90deg, var(--color-border-light) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
        }

        #app {
            position: relative;
            z-index: 1;
            max-width: var(--max-width);
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3 { font-weight: 600; line-height: 1.25; letter-spacing: -0.02em; }
        h1 { font-size: 1.375rem; }
        h2 { font-size: 1.125rem; }
        h3 { font-size: 1rem; }
        p { color: var(--color-text-secondary); }
        img { max-width: 100%; height: auto; display: block; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; font-size: 1rem; }

        :focus-visible {
            outline: 2.5px solid var(--color-accent);
            outline-offset: 2px;
            border-radius: var(--radius-sm);
        }

        .sr-only {
            position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
            overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border-width: 0;
        }

        /* Layout */
        .app-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255, 255, 255, 0.96);
            border-bottom: 1.5px solid var(--color-border);
            padding: var(--space-sm) var(--space-md);
            display: flex; align-items: center; justify-content: space-between;
            height: var(--header-height); gap: var(--space-md);
        }
        .app-header__brand h1 { font-size: 1.0625rem; font-weight: 700; letter-spacing: -0.01em; white-space: nowrap; }

        .main-content {
            flex: 1; padding: var(--space-md);
            padding-bottom: calc(var(--footer-height) + var(--space-xl));
        }

        .navigation-footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.98);
            border-top: 1.5px solid var(--color-border);
            padding: var(--space-sm) var(--space-md);
            display: flex; justify-content: space-between; align-items: center;
            height: var(--footer-height); z-index: 100;
            max-width: var(--max-width); margin: 0 auto;
        }

        /* Save button */
        .save-button {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border: 1.5px solid var(--color-accent);
            color: var(--color-accent);
            border-radius: var(--radius-sm);
            background: transparent;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }
        .save-button:hover {
            background: var(--color-accent);
            color: #fff;
        }
        .save-button--saved {
            border-color: #166534;
            color: #166534;
        }
        .save-button--saved:hover {
            background: #166534;
            color: #fff;
        }

        /* Reset button */
        .reset-button {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border: 1.5px solid #991b1b;
            color: #991b1b;
            border-radius: var(--radius-sm);
            background: transparent;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }
        .reset-button:hover {
            background: #991b1b;
            color: #fff;
        }

        /* Components */
        .progress-bar { display: flex; align-items: center; gap: var(--space-sm); flex-shrink: 0; }
        .progress-bar__track {
            width: 100px; height: 6px; background: var(--color-border-light);
            border-radius: 3px; overflow: hidden;
        }
        .progress-bar__fill { height: 100%; background: var(--color-accent); border-radius: 3px; transition: width var(--transition-slow); }
        .progress-bar__label { font-size: 0.75rem; color: var(--color-text-muted); font-weight: 600; font-variant-numeric: tabular-nums; }

        .modules-grid { display: grid; gap: var(--space-md); }
        .module-card {
            border: 1.5px solid var(--color-border); border-radius: var(--radius-md);
            padding: var(--space-md); background: var(--color-bg);
            transition: border-color var(--transition-base), transform var(--transition-base);
            cursor: pointer; position: relative;
        }
        .module-card:hover:not(.module-card--locked):not(.module-card--completed) {
            border-color: var(--color-text); transform: translateY(-2px);
        }
        .module-card--locked { opacity: 0.45; cursor: not-allowed; }
        .module-card--completed { border-color: var(--color-accent); }
        .module-card__header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-sm); gap: var(--space-sm); }
        .module-card__title { font-size: 0.9375rem; font-weight: 600; }
        .module-card__status {
            font-size: 0.6875rem; font-weight: 700; padding: var(--space-xs) var(--space-sm);
            border-radius: var(--radius-sm); text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap;
        }
        .module-card__status--completed { background: var(--color-accent-light); color: var(--color-accent); }
        .module-card__status--locked { background: var(--color-border-light); color: var(--color-text-muted); }
        
        .component-icon {
            width: 100%; height: 140px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: var(--space-sm);
            border-radius: var(--radius-sm);
            background: var(--color-surface);
            color: var(--color-text);
        }
        .component-icon svg {
            width: 80px; height: 80px;
            stroke-width: 1.5;
        }
        
        .module-card__description { font-size: 0.8125rem; color: var(--color-text-secondary); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .question-card { max-width: 560px; margin: 0 auto; }
        .question-card__counter {
            font-size: 0.6875rem; color: var(--color-text-muted); text-transform: uppercase;
            letter-spacing: 0.08em; margin-bottom: var(--space-sm); display: block; font-weight: 600;
        }
        .question-card__title { font-size: 1.0625rem; font-weight: 600; margin-bottom: var(--space-lg); line-height: 1.4; }

        .answers-list { display: flex; flex-direction: column; gap: var(--space-sm); }
        .answer-button {
            width: 100%; text-align: left; padding: var(--space-md);
            border: 1.5px solid var(--color-border); border-radius: var(--radius-md);
            font-size: 0.9375rem; font-weight: 500; transition: all var(--transition-base);
            display: flex; align-items: center; gap: var(--space-md); background: var(--color-bg); line-height: 1.35;
        }
        .answer-button:hover:not(:disabled) { border-color: var(--color-text); background: var(--color-surface); }
        .answer-button--selected { border-color: var(--color-accent); background: var(--color-accent-light); }
        .answer-button--correct { border-color: var(--color-accent); background: var(--color-accent-light); color: var(--color-accent); }
        .answer-button--incorrect { border-color: #991b1b; background: #fef2f2; }
        .answer-button:disabled { cursor: not-allowed; }
        .answer-button__letter {
            display: inline-flex; align-items: center; justify-content: center;
            width: 30px; height: 30px; border: 1.5px solid currentColor;
            border-radius: var(--radius-sm); font-size: 0.8125rem; font-weight: 700; flex-shrink: 0;
        }

        .explanation-card {
            border: 1.5px solid var(--color-accent); border-radius: var(--radius-md);
            padding: var(--space-lg); margin-top: var(--space-lg); background: var(--color-accent-light);
            animation: fadeIn var(--transition-base);
        }
        .explanation-card__title { font-size: 0.875rem; font-weight: 700; color: var(--color-accent); margin-bottom: var(--space-sm); text-transform: uppercase; letter-spacing: 0.05em; }
        .explanation-card__text { font-size: 0.9375rem; line-height: 1.6; color: var(--color-text); }

        .sketch-image {
            border: 1.5px solid var(--color-border); border-radius: var(--radius-md);
            padding: var(--space-md); background: var(--color-surface); margin-bottom: var(--space-lg);
            display: flex; align-items: center; justify-content: center;
        }
        .sketch-image .component-icon { margin: 0; background: transparent; height: 220px; }
        .sketch-image .component-icon svg { width: 160px; height: 160px; }
        .sketch-image__caption { text-align: center; font-size: 0.6875rem; color: var(--color-text-muted); margin-top: var(--space-sm); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }

        .diagram-container { position: relative; width: 100%; max-width: 900px; margin: 0 auto; padding: var(--space-xl) var(--space-md); }
        .diagram-nodes { position: relative; display: flex; flex-direction: column; align-items: center; gap: var(--space-xl); }
        .diagram-node {
            display: flex; flex-direction: column; align-items: center; gap: var(--space-sm);
            padding: var(--space-md); border: 1.5px solid var(--color-border);
            border-radius: var(--radius-md); background: var(--color-bg); min-width: 160px;
            transition: all var(--transition-base); position: relative;
        }
        .diagram-node--active { border-color: var(--color-accent); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08); }
        .diagram-node--locked { opacity: 0.35; filter: grayscale(1); }
        .diagram-node__number {
            position: absolute; top: -10px; left: -10px;
            width: 26px; height: 26px; background: var(--color-text);
            color: var(--color-bg); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700; border: 2px solid var(--color-bg);
            z-index: 2;
        }
        .diagram-node__icon { width: 64px; height: 64px; color: var(--color-text); }
        .diagram-node__icon svg { width: 100%; height: 100%; stroke-width: 1.5; }
        .diagram-node__label { font-size: 0.8125rem; font-weight: 600; text-align: center; }

        .nav-button {
            padding: var(--space-sm) var(--space-md); border: 1.5px solid var(--color-text);
            border-radius: var(--radius-md); font-size: 0.8125rem; font-weight: 600;
            transition: all var(--transition-base); min-width: 90px; text-align: center; background: transparent;
        }
        .nav-button:hover:not(:disabled) { background: var(--color-text); color: var(--color-bg); }
        .nav-button:disabled { opacity: 0.3; cursor: not-allowed; }
        .nav-button--primary { background: var(--color-text); color: var(--color-bg); border-color: var(--color-text); }
        .nav-button--primary:hover:not(:disabled) { background: var(--color-text-secondary); border-color: var(--color-text-secondary); }

        .toast-container {
            position: fixed; top: calc(var(--header-height) + var(--space-md)); right: var(--space-md);
            z-index: 200; display: flex; flex-direction: column; gap: var(--space-sm); pointer-events: none;
        }
        .toast {
            padding: var(--space-md) var(--space-lg); border-radius: var(--radius-md);
            border: 1.5px solid var(--color-border); background: var(--color-bg);
            font-size: 0.875rem; font-weight: 500; animation: toastIn var(--transition-base);
            pointer-events: auto; max-width: 300px; line-height: 1.4;
        }
        .toast--error { border-color: #991b1b; background: #fef2f2; }
        .toast--success { border-color: #166534; background: #f0fdf4; }
        .toast--info { border-color: var(--color-accent); background: var(--color-accent-light); }

        .completion-screen { text-align: center; padding: var(--space-2xl) var(--space-md); max-width: 560px; margin: 0 auto; }
        .completion-screen__icon {
            width: 72px; height: 72px; margin: 0 auto var(--space-lg);
            border: 2.5px solid var(--color-accent); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.75rem; color: var(--color-accent); font-weight: 700;
        }
        .completion-screen__title { font-size: 1.375rem; margin-bottom: var(--space-md); }
        .completion-screen__text { color: var(--color-text-secondary); margin-bottom: var(--space-xl); font-size: 0.9375rem; line-height: 1.55; }

        .learning-stage { max-width: 600px; margin: 0 auto; }
        .learning-stage__header { margin-bottom: var(--space-xl); }
        .learning-stage__component-title { font-size: 1.125rem; font-weight: 700; margin-bottom: var(--space-xs); }
        .learning-stage__component-subtitle { font-size: 0.75rem; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
        .learning-stage__image { width: 100%; max-height: 260px; object-fit: contain; margin-bottom: var(--space-lg); border: 1.5px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-md); background: var(--color-surface); }
        .learning-stage__description { font-size: 0.9375rem; line-height: 1.65; color: var(--color-text); margin-bottom: var(--space-xl); padding: var(--space-lg); border-left: 3px solid var(--color-accent); background: var(--color-surface); border-radius: 0 var(--radius-md) var(--radius-md) 0; }

        .spaced-retrieval-banner { background: var(--color-surface); border: 1.5px dashed var(--color-accent); border-radius: var(--radius-md); padding: var(--space-lg); margin-bottom: var(--space-xl); text-align: center; }
        .spaced-retrieval-banner__label { font-size: 0.6875rem; font-weight: 700; color: var(--color-accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: var(--space-xs); }

        /* Final Quiz */
        .quiz-progress {
            display: flex; align-items: center; gap: var(--space-sm);
            margin-bottom: var(--space-lg);
        }
        .quiz-progress__dots {
            display: flex; gap: var(--space-xs);
        }
        .quiz-progress__dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--color-border-light); border: 1px solid var(--color-border);
            transition: all var(--transition-base);
        }
        .quiz-progress__dot--current { background: var(--color-accent); border-color: var(--color-accent); }
        .quiz-progress__dot--correct { background: var(--color-accent); border-color: var(--color-accent); }
        .quiz-progress__dot--incorrect { background: #991b1b; border-color: #991b1b; }

        .quiz-summary {
            max-width: 560px; margin: 0 auto; text-align: center;
        }
        .quiz-summary__score {
            font-size: 3rem; font-weight: 700; color: var(--color-accent);
            line-height: 1; margin-bottom: var(--space-sm);
        }
        .quiz-summary__label {
            font-size: 0.875rem; color: var(--color-text-muted);
            text-transform: uppercase; letter-spacing: 0.08em;
            font-weight: 600; margin-bottom: var(--space-xl);
        }
        .quiz-summary__details {
            text-align: left; border: 1.5px solid var(--color-border);
            border-radius: var(--radius-md); padding: var(--space-lg);
            margin-bottom: var(--space-xl);
        }
        .quiz-summary__item {
            display: flex; align-items: flex-start; gap: var(--space-md);
            padding: var(--space-sm) 0;
            border-bottom: 1px solid var(--color-border-light);
        }
        .quiz-summary__item:last-child { border-bottom: none; }
        .quiz-summary__marker {
            width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700; flex-shrink: 0; margin-top: 2px;
        }
        .quiz-summary__marker--correct { background: var(--color-accent-light); color: var(--color-accent); }
        .quiz-summary__marker--incorrect { background: #fef2f2; color: #991b1b; }
        .quiz-summary__question { font-size: 0.875rem; font-weight: 500; line-height: 1.4; }
        .quiz-summary__answer { font-size: 0.8125rem; color: var(--color-text-muted); margin-top: var(--space-xs); }

        .text-center { text-align: center; }
        .mt-lg { margin-top: var(--space-lg); }
        .mb-lg { margin-bottom: var(--space-lg); }
        .hidden { display: none !important; }

        @keyframes toastIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        @media (min-width: 768px) {
            .main-content { padding: var(--space-xl); padding-bottom: calc(var(--footer-height) + var(--space-2xl)); }
            .app-header { padding: var(--space-sm) var(--space-xl); }
            .navigation-footer { padding: var(--space-sm) var(--space-xl); }
            .modules-grid { grid-template-columns: repeat(2, 1fr); }
            .sketch-image .component-icon { height: 280px; }
            .sketch-image .component-icon svg { width: 200px; height: 200px; }
            .component-icon { height: 160px; }
            .component-icon svg { width: 100px; height: 100px; }
        }

        @media (min-width: 1024px) {
            .main-content { padding: var(--space-2xl); padding-bottom: calc(var(--footer-height) + var(--space-2xl)); }
            .app-header__brand h1 { font-size: 1.25rem; }
            .modules-grid { grid-template-columns: repeat(3, 1fr); }
            .diagram-nodes { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-xl); align-items: start; }
            .diagram-nodes .diagram-node:nth-child(odd) { transform: translateY(var(--space-lg)); }
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="app-header__brand"><h1>Układ Rozruchowy</h1></div>
            <div style="display: flex; align-items: center; gap: var(--space-md);">
                <div id="progress-container"></div>
                <button class="save-button" id="btn-save" aria-label="Zapisz aktualny postęp">Zapisz</button>
                <button class="reset-button" id="btn-reset" aria-label="Zresetuj postęp i zacznij od początku">Reset</button>
            </div>
        </header>
        <main id="main-content" class="main-content"></main>
        <footer id="navigation-footer" class="navigation-footer" role="contentinfo"></footer>
        <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>
    </div>

    <script type="module">
        const STORAGE_KEY = 'oilSystemTraining_state';

        // ==================== IKONY SVG ====================
        const ICONS = {
            // 1. Żródło powietrza (Air Source - wylot/dopływ sprężonego powietrza z falami strumienia)
            'air-source': `<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 32h28"/><path d="M36 22l10 10-10 10"/><path d="M12 20c8 0 12-8 20-8s12 8 20 8"/><path d="M12 44c8 0 12 8 20 8s12-8 20-8"/><path d="M8 24h16"/><path d="M8 40h16"/></svg>`,

            // Rozrusznik turbinowy (Air Turbine Starter - korpus turbiny z wirnikiem i wałkiem napędowym)
            'ats': `<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="10" y="16" width="30" height="32" rx="4"/><path d="M40 24h10l6 8-6 8H40"/><circle cx="25" cy="32" r="8"/><path d="M25 24v16"/><path d="M17 32h16"/><path d="M19 26l12 12"/><path d="M19 38l12-12"/><path d="M6 26h4"/><path d="M6 38h4"/></svg>`,
            
            // 3. Główna przekładnia (Main Gearbox - zazębiające się koła zębate w obudowie)
            'main-gearbox': `<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="10" y="10" width="44" height="44" rx="6"/><circle cx="28" cy="28" r="10"/><circle cx="40" cy="40" r="6"/><path d="M28 14v4"/><path d="M28 38v4"/><path d="M14 28h4"/><path d="M38 28h4"/><path d="M40 30v2"/><path d="M40 48v2"/><path d="M30 40h2"/><path d="M48 40h2"/></svg>`,

            // 4. Przekładnia kątowa (Angle Gearbox - połączone koła stożkowe pod kątem 90 stopni)
            'angle-gearbox': `<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 36h20v16"/><path d="M32 36l16-16"/><path d="M22 26l10 10"/><path d="M32 20l12 12"/><path d="M8 36h4"/><path d="M32 56v-4"/><path d="M52 16l-4 4"/></svg>`,

            // 5. Wał wysokiego ciśnienia (High Pressure Shaft - koncentryczny wał z łożyskami i oznaczeniem HP)
            'high-pressure-shaft': `<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 26h48v12H8z"/><path d="M8 32h48"/><rect x="16" y="20" width="8" height="24" rx="2"/><rect x="40" y="20" width="8" height="24" rx="2"/><path d="M28 20l4 8-4 8"/><path d="M34 20v16"/></svg>`

            }
        }

            btn.disabled = state !== 'default';

        // ==================== DIAGRAM ====================
        class OilSystemDiagram {
            constructor(containerId) {
                this.container = document.getElementById(containerId);
            }

            render() {
                if (!this.container) return;
                const completedIds = courseData.modules.filter(m => m.completed).map(m => m.id);
                const visibleIds = new Set();
                diagramOrder.forEach((id, index) => {
                    if (index === 0) visibleIds.add(id);
                    else {
                        const prevId = diagramOrder[index - 1];
                        const prevModule = courseData.modules.find(m => m.id === prevId);
                        if (prevModule?.completed || completedIds.includes(id)) visibleIds.add(id);
                    }
                });
                courseData.modules.forEach(m => { if (m.unlocked) visibleIds.add(m.id); });

                this.container.innerHTML = '';
                const wrapper = document.createElement('div');
                wrapper.className = 'diagram-container';
                const nodesContainer = document.createElement('div');
                nodesContainer.className = 'diagram-nodes';

                diagramOrder.forEach((id, index) => {
                    if (!visibleIds.has(id)) return;
                    const module = courseData.modules.find(m => m.id === id);
                    const isCompleted = module?.completed;
                    const isActive = module?.unlocked && !module?.completed;
                    const node = document.createElement('div');
                    node.className = `diagram-node ${isActive ? 'diagram-node--active' : ''} ${!module?.unlocked ? 'diagram-node--locked' : ''}`;
                    node.dataset.id = id;
                    node.innerHTML = `
                        <div class="diagram-node__number">${index + 1}</div>
                        ${getDiagramIcon(id)}
                        <span class="diagram-node__label">${module.title}</span>
                    `;
                    nodesContainer.appendChild(node);
                });

                wrapper.appendChild(nodesContainer);
                this.container.appendChild(wrapper);
            }
        }

            renderRecallStage() {
                this.container.innerHTML = `
                    <div class="learning-stage">
                        <div class="learning-stage__header">

                    </div>`;
                this.attachAnswerListeners('recall');
            }

            attachAnswerListeners(stage) {
                const buttons = this.container.querySelectorAll('.answer-button');
                const continueBtn = document.getElementById('btn-continue');
                buttons.forEach(btn => {
                    btn.addEventListener('click', () => {
                        const index = parseInt(btn.dataset.index);
                        buttons.forEach(b => updateAnswerButtonState(b, 'default'));
                        updateAnswerButtonState(btn, 'selected');
                        this.selectedAnswer = index;
                        if (stage === 'prediction') {
                            continueBtn.disabled = false;
                            continueBtn.addEventListener('click', () => this.renderTheoryStage(), { once: true });
                        } else if (stage === 'recall') {
                            this.handleRecallAnswer(index, buttons);
                        }
                    });
                });
            }

                const correctIndex = this.module.quiz.answer;
                const feedbackArea = document.getElementById('feedback-area');
                const actionsArea = document.getElementById('stage-actions');
                const continueBtn = document.getElementById('btn-continue');
                buttons.forEach(b => b.disabled = true);

                if (selectedIndex === correctIndex) {
                    updateAnswerButtonState(buttons[selectedIndex], 'correct');
                    showToast('Poprawnie! Świetna robota.', 'success', 2000);
                    actionsArea.classList.remove('hidden');
                    continueBtn.addEventListener('click', () => this.completeModule(), { once: true });
                } else {
                    this.attempts++;
                    updateAnswerButtonState(buttons[selectedIndex], 'incorrect');
                    if (this.attempts === 1) {
                        showToast('Nie tym razem. Spróbuj jeszcze raz.', 'error', 2500);
                        feedbackArea.innerHTML = `<div class="mt-lg" style="text-align: center; color: var(--color-text-secondary); font-weight: 500; font-size: 0.9375rem;">Nie tym razem. Spróbuj jeszcze raz.</div>`;
                        setTimeout(() => {
                            buttons.forEach(b => { updateAnswerButtonState(b, 'default'); b.disabled = false; });
                            this.selectedAnswer = null;
                        }, 1600);
                    } else {
                        showToast('Sprawdź poprawną odpowiedź poniżej.', 'info', 3000);
                        updateAnswerButtonState(buttons[correctIndex], 'correct');
                        feedbackArea.innerHTML = renderExplanationCard(this.module.quiz.explanation);
                        actionsArea.classList.remove('hidden');
                        continueBtn.addEventListener('click', () => this.completeModule(), { once: true });
                    }
                }
            }

            completeModule() {
                this.module.completed = true;
                const currentIndex = courseData.modules.findIndex(m => m.id === this.module.id);
                if (currentIndex < courseData.modules.length - 1) courseData.modules[currentIndex + 1].unlocked = true;
                const completedCount = courseData.modules.filter(m => m.completed).length;
                if (completedCount % 3 === 0 && completedCount > 0) {
                    if (this.onSpacedRetrieval) { this.onSpacedRetrieval(); return; }
                }
                if (this.onComplete) this.onComplete();
            }

            static getRandomPreviousQuestion(excludeModuleId) {
                const completedModules = courseData.modules.filter(m => m.completed && m.id !== excludeModuleId);
                if (completedModules.length === 0) return null;
                return completedModules[Math.floor(Math.random() * completedModules.length)];
            }

            renderSpacedRetrieval(callback) {
                const randomModule = LearningModule.getRandomPreviousQuestion(this.module.id);
                if (!randomModule) { if (callback) callback(); return; }
                this.container.innerHTML = `
                    <div class="learning-stage">
                        ${renderSpacedRetrievalBanner()}
                        <div class="learning-stage__header">
                            <h2 class="learning-stage__component-title">Szybkie przypomnienie: ${randomModule.title}</h2>
                        </div>
                        ${renderQuestionCard(randomModule.quiz.question, randomModule.quiz.options)}
                        <div id="feedback-area"></div>
                        <div id="stage-actions" class="mt-lg text-center hidden">
                            <button class="nav-button nav-button--primary" id="btn-continue">Kontynuuj</button>
                        </div>
                    </div>`;
                const buttons = this.container.querySelectorAll('.answer-button');
                let answered = false;
                buttons.forEach(btn => {
                    btn.addEventListener('click', () => {
                        if (answered) return;
                        answered = true;
                        const index = parseInt(btn.dataset.index);
                        buttons.forEach(b => b.disabled = true);
                        if (index === randomModule.quiz.answer) {
                            updateAnswerButtonState(btn, 'correct');
                            showToast('Poprawnie!', 'success', 2000);
                        } else {
                            updateAnswerButtonState(btn, 'incorrect');
                            updateAnswerButtonState(buttons[randomModule.quiz.answer], 'correct');
                            document.getElementById('feedback-area').innerHTML = renderExplanationCard(randomModule.quiz.explanation);
                        }
                        document.getElementById('stage-actions').classList.remove('hidden');
                        document.getElementById('btn-continue').addEventListener('click', () => { if (callback) callback(); }, { once: true });
                    });
                });
            }
        }

        // ==================== FINAL QUIZ ====================
        class FinalQuiz {
            constructor(onFinish) {
                this.onFinish = onFinish;
                this.container = document.getElementById('main-content');
                this.current = 0;
                this.score = 0;
                this.answers = [];
                this.answered = false;
            }

            start() {
                this.current = 0;
                this.score = 0;
                this.answers = [];
                this.renderQuestion();
            }

            renderQuestion() {
                const q = finalQuizData[this.current];
                const total = finalQuizData.length;
                this.answered = false;

                this.container.innerHTML = `
                    <div class="learning-stage">
                        <div class="quiz-progress">
                            <div class="quiz-progress__dots">
                                ${finalQuizData.map((_, i) => {
                                    let cls = 'quiz-progress__dot';
                                    if (i < this.current) {
                                        cls += this.answers[i].correct ? ' quiz-progress__dot--correct' : ' quiz-progress__dot--incorrect';
                                    } else if (i === this.current) {
                                        cls += ' quiz-progress__dot--current';
                                    }
                                    return `<div class="${cls}" aria-hidden="true"></div>`;
                                }).join('')}
                            </div>
                            <span style="font-size: 0.75rem; color: var(--color-text-muted); font-weight: 600;">Pytanie ${this.current + 1} / ${total}</span>
                        </div>
                        ${renderQuestionCard(q.question, q.options)}
                        <div id="feedback-area"></div>
                        <div id="stage-actions" class="mt-lg text-center hidden">
                            <button class="nav-button nav-button--primary" id="btn-continue">${this.current < total - 1 ? 'Następne pytanie' : 'Zobacz wynik'}</button>
                        </div>
                    </div>
                `;

                const buttons = this.container.querySelectorAll('.answer-button');
                buttons.forEach(btn => {
                    btn.addEventListener('click', () => {
                        if (this.answered) return;
                        this.answered = true;
                        const index = parseInt(btn.dataset.index);
                        this.handleAnswer(index, buttons);
                    });
                });
            }

            handleAnswer(selectedIndex, buttons) {
                const q = finalQuizData[this.current];
                const correct = selectedIndex === q.answer;
                const feedbackArea = document.getElementById('feedback-area');
                const actionsArea = document.getElementById('stage-actions');

                buttons.forEach(b => b.disabled = true);

                if (correct) {
                    this.score++;
                    updateAnswerButtonState(buttons[selectedIndex], 'correct');
                    showToast('Poprawnie!', 'success', 1500);
                } else {
                    updateAnswerButtonState(buttons[selectedIndex], 'incorrect');
                    updateAnswerButtonState(buttons[q.answer], 'correct');
                }

                this.answers.push({ question: q.question, selected: selectedIndex, correct: correct, correctIndex: q.answer });

                feedbackArea.innerHTML = renderExplanationCard(q.explanation);
                actionsArea.classList.remove('hidden');

                document.getElementById('btn-continue').addEventListener('click', () => {
                    this.current++;
                    if (this.current < finalQuizData.length) {
                        this.renderQuestion();
                    } else {
                        this.renderSummary();
                    }
                }, { once: true });
            }

            renderSummary() {
                const total = finalQuizData.length;
                const percentage = Math.round((this.score / total) * 100);
                let grade = '';
                if (percentage >= 90) grade = 'Celujący';
                else if (percentage >= 80) grade = 'Bardzo dobry';
                else if (percentage >= 70) grade = 'Dobry';
                else if (percentage >= 60) grade = 'Dostateczny';
                else grade = 'Wymaga powtórki';

                this.container.innerHTML = `
                    <div class="quiz-summary">
                        <div class="completion-screen__icon" aria-hidden="true">✓</div>
                        <h1 class="completion-screen__title">Quiz ukończony</h1>
                        <div class="quiz-summary__score">${percentage}%</div>
                        <div class="quiz-summary__label">${this.score} / ${total} poprawnych · ${grade}</div>
                        
                        <div class="quiz-summary__details">
                            ${this.answers.map((a, i) => `
                                <div class="quiz-summary__item">
                                    <div class="quiz-summary__marker ${a.correct ? 'quiz-summary__marker--correct' : 'quiz-summary__marker--incorrect'}" aria-hidden="true">${a.correct ? '✓' : '✕'}</div>
                                    <div>
                                        <div class="quiz-summary__question">${i + 1}. ${a.question}</div>
                                        ${!a.correct ? `<div class="quiz-summary__answer">Poprawna: ${finalQuizData[i].options[a.correctIndex]}</div>` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <div style="display: flex; flex-direction: column; gap: var(--space-md); align-items: center;">
                            <a href="https://sites.google.com/view/inside-the-engine/systemy/rozruchowy/mind_map_starting" class="nav-button nav-button--primary" id="btn-reward" style="min-width: 220px; text-decoration: none; display: inline-flex; justify-content: center; align-items: center;">Odbierz nagrodę</a>
                            <button class="nav-button nav-button--primary" id="btn-retry-quiz" style="min-width: 220px;">Powtórz quiz</button>
                            <button class="nav-button" id="btn-back-modules" style="min-width: 220px;">Wróć do modułów</button>
                        </div>
                    </div>
                `;

                document.getElementById('btn-retry-quiz').addEventListener('click', () => this.start());
                document.getElementById('btn-back-modules').addEventListener('click', () => {
                    if (this.onFinish) this.onFinish();
                });
            }
        }

        // ==================== APP ====================
        class App {
            constructor() {
                this.state = { view: 'modules', currentModuleId: null };
                this.diagram = null;
                this.learning = null;
                this.finalQuiz = null;
                this.init();
            }

            init() {
                const saved = loadState();
                if (saved) {
                    if (saved.modules) {
                        saved.modules.forEach(savedMod => {
                            const mod = courseData.modules.find(m => m.id === savedMod.id);
                            if (mod) {
                                mod.unlocked = savedMod.unlocked;
                                mod.completed = savedMod.completed;
                            }
                        });
                    }
                    this.state.view = saved.view || 'modules';
                    this.state.currentModuleId = saved.currentModuleId || null;
                }

                this.updateProgressBar();
                this.renderFooter();
                this.navigateTo(this.state.view, this.state.currentModuleId, true);
                this.attachGlobalEvents();
            }

            attachGlobalEvents() {
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && (this.state.view === 'learning' || this.state.view === 'diagram' || this.state.view === 'final-quiz')) {
                        this.navigateTo('modules');
                    }
                });

                document.getElementById('btn-save').addEventListener('click', () => {
                    this.persist();
                    const btn = document.getElementById('btn-save');
                    const originalText = btn.textContent;
                    btn.textContent = 'Zapisano!';
                    btn.classList.add('save-button--saved');
                    showToast('Postęp zapisany pomyślnie!', 'success', 2000);
                    setTimeout(() => {
                        btn.textContent = originalText;
                        btn.classList.remove('save-button--saved');
                    }, 2000);
                });

                document.getElementById('btn-reset').addEventListener('click', () => {
                    if (confirm('Czy na pewno chcesz zresetować cały postęp? Ta operacja jest nieodwracalna.')) {
                        clearState();
                        // Reset danych do domyślnych
                        courseData.modules.forEach((m, i) => {
                            m.unlocked = i === 0;
                            m.completed = false;
                        });
                        window.location.reload();
                    }
                });
            }

            persist() {
                saveState({
                    modules: courseData.modules,
                    view: this.state.view,
                    currentModuleId: this.state.currentModuleId
                });
            }

            updateProgressBar() {
                const container = document.getElementById('progress-container');
                if (container) container.innerHTML = renderProgressBar();
            }

            renderFooter() {
                const footer = document.getElementById('navigation-footer');
                if (this.state.view === 'modules') {
                    footer.innerHTML = renderNavigationFooter({ prev: { label: 'Wstecz', disabled: true }, center: { label: 'Diagram', primary: false }, next: { label: 'Dalej', disabled: true } });
                    document.getElementById('nav-center')?.addEventListener('click', () => this.navigateTo('diagram'));
                } else if (this.state.view === 'learning') {
                    const moduleIndex = courseData.modules.findIndex(m => m.id === this.state.currentModuleId);
                    footer.innerHTML = renderNavigationFooter({
                        prev: { label: 'Moduły', disabled: false },
                        center: { label: 'Diagram', primary: false },
                        next: { label: 'Dalej', disabled: moduleIndex >= courseData.modules.length - 1 }
                    });
                    document.getElementById('nav-prev')?.addEventListener('click', () => this.navigateTo('modules'));
                    document.getElementById('nav-center')?.addEventListener('click', () => this.navigateTo('diagram'));
                    document.getElementById('nav-next')?.addEventListener('click', () => {
                        const nextIndex = moduleIndex + 1;
                        if (nextIndex < courseData.modules.length) {
                            const nextModule = courseData.modules[nextIndex];
                            if (nextModule.unlocked) this.startLearning(nextModule.id);
                            else showToast('Najpierw ukończ bieżący moduł.', 'info', 2000);
                        }
                    });
                } else if (this.state.view === 'diagram') {
                    footer.innerHTML = renderNavigationFooter({ prev: { label: 'Wstecz', disabled: false }, next: { label: 'Dalej', disabled: true } });
                    document.getElementById('nav-prev')?.addEventListener('click', () => this.navigateTo('modules'));
                } else if (this.state.view === 'completion') {
                    footer.innerHTML = renderNavigationFooter({ prev: { label: 'Moduły', disabled: false }, center: { label: 'Diagram', primary: false }, next: { label: 'Dalej', disabled: true } });
                    document.getElementById('nav-prev')?.addEventListener('click', () => this.navigateTo('modules'));
                    document.getElementById('nav-center')?.addEventListener('click', () => this.navigateTo('diagram'));
                } else if (this.state.view === 'final-quiz') {
                    footer.innerHTML = renderNavigationFooter({ prev: { label: '← Zakończ quiz', disabled: false }, next: { label: 'Dalej', disabled: true } });
                    document.getElementById('nav-prev')?.addEventListener('click', () => this.navigateTo('completion'));
                }
            }

            navigateTo(view, moduleId = null, skipPersist = false) {
                this.state.view = view;
                this.state.currentModuleId = moduleId;
                const main = document.getElementById('main-content');
                if (this.diagram) { this.diagram = null; }
                switch(view) {
                    case 'modules': this.renderModulesView(main); break;
                    case 'learning': if (moduleId) this.startLearning(moduleId); break;
                    case 'diagram': this.renderDiagramView(main); break;
                    case 'completion': this.renderCompletionView(main); break;
                    case 'final-quiz': this.renderFinalQuizView(main); break;
                    default: this.renderModulesView(main);
                }
                this.updateProgressBar();
                this.renderFooter();
                if (!skipPersist) this.persist();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            renderModulesView(container) {
                container.innerHTML = '';
                const allCompleted = courseData.modules.every(m => m.completed);
                if (allCompleted && courseData.modules.length > 0) {
                    container.innerHTML = `
                        <div style="background: var(--color-accent-light); border: 1.5px solid var(--color-accent); border-radius: var(--radius-md); padding: var(--space-lg); margin-bottom: var(--space-xl); text-align: center;">
                            <strong style="color: var(--color-accent); font-size: 0.9375rem;">Wszystkie moduły ukończone!</strong>
                            <p style="margin-top: var(--space-sm); font-size: 0.875rem; color: var(--color-text-secondary);">Możesz teraz przejrzeć pełny diagram układu lub rozwiązać quiz końcowy.</p>
                        </div>`;
                } else {
                    container.innerHTML = '<h2 class="mb-lg" style="font-size: 1rem; color: var(--color-text-secondary); font-weight: 500;">Wybierz moduł, aby rozpocząć</h2>';
                }
                const grid = document.createElement('div');
                grid.className = 'modules-grid';
                grid.setAttribute('role', 'list');
                courseData.modules.forEach((module, index) => {
                    const wrapper = document.createElement('div');
                    wrapper.setAttribute('role', 'listitem');
                    wrapper.innerHTML = renderModuleCard(module, index);
                    grid.appendChild(wrapper);
                });
                container.appendChild(grid);

                grid.querySelectorAll('.module-card').forEach(card => {
                    const moduleId = card.dataset.moduleId;
                    const module = courseData.modules.find(m => m.id === moduleId);
                    const handleActivate = () => {
                        if (module.unlocked) this.startLearning(moduleId);
                        else showToast('Ukończ wcześniejsze moduły, aby odblokować.', 'info', 2000);
                    };
                    card.addEventListener('click', handleActivate);
                    card.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleActivate(); }
                    });
                });
            }

            startLearning(moduleId) {
                this.state.view = 'learning';
                this.state.currentModuleId = moduleId;
                this.persist();
                this.renderFooter();
                const module = courseData.modules.find(m => m.id === moduleId);
                if (!module.unlocked) { showToast('Moduł jest zablokowany.', 'error', 2000); this.navigateTo('modules'); return; }

                this.learning = new LearningModule(
                    moduleId,
                    () => {
                        this.persist();
                        const allCompleted = courseData.modules.every(m => m.completed);
                        if (allCompleted) this.navigateTo('completion');
                        else { showToast('Moduł ukończony!', 'success', 2000); this.navigateTo('modules'); }
                    },
                    () => {
                        this.learning.renderSpacedRetrieval(() => {
                            this.persist();
                            const allCompleted = courseData.modules.every(m => m.completed);
                            if (allCompleted) this.navigateTo('completion');
                            else { showToast('Moduł ukończony!', 'success', 2000); this.navigateTo('modules'); }
                        });
                    }
                );
                this.learning.start();
            }

            renderDiagramView(container) {
                container.innerHTML = `<h2 class="mb-lg" style="text-align: center; font-size: 1.125rem;">Diagram Układu Rozruchowego</h2><div id="diagram-root"></div>`;
                this.diagram = new OilSystemDiagram('diagram-root');
                this.diagram.render();
            }

            renderCompletionView(container) {
                container.innerHTML = renderCompletionScreen();
                document.getElementById('btn-view-diagram')?.addEventListener('click', () => this.navigateTo('diagram'));
                document.getElementById('btn-start-final-quiz')?.addEventListener('click', () => this.navigateTo('final-quiz'));
            }

            renderFinalQuizView(container) {
                container.innerHTML = '';
                this.finalQuiz = new FinalQuiz(() => this.navigateTo('modules'));
                this.finalQuiz.start();
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => new App());
        } else {
            new App();
        }
    </script>
</body>
</html>
