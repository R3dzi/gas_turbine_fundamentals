<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Siatka papieru milimetrowego / blueprint -->
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#1e293b" stroke-width="1" />
    </pattern>
    <pattern id="grid-major" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#grid)" />
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#334155" stroke-width="1.5" />
    </pattern>

    <!-- Pojedyncza łopatka turbiny (styl szkicu) -->
    <g id="blade">
      <!-- Główny obrys łopatki -->
      <path d="M 250 205 C 265 170, 275 130, 245 82 C 230 120, 228 165, 250 205 Z" 
            fill="#38bdf8" fill-opacity="0.1" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Dodatkowa linia szkicowa (efekt rysowania ręcznego) -->
      <path d="M 251 203 C 267 168, 273 132, 243 84" 
            fill="none" stroke="#93c5fd" stroke-width="1" stroke-dasharray="8 4" opacity="0.7"/>
      <!-- Kreskowanie / cieniowanie szkicowe -->
      <path d="M 248 160 L 260 165 M 245 140 L 258 143 M 243 120 L 254 122" 
            stroke="#e0f2fe" stroke-width="1" opacity="0.5"/>
    </g>

    <!-- Strzałka wymiarowa -->
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Tło: Zaokrąglony kwadrat w stylu ciemnego arkusza inżynieryjnego -->
  <rect width="500" height="500" rx="64" fill="#0f172a"/>
  <rect width="500" height="500" rx="64" fill="url(#grid-major)"/>

  <!-- Linia koła pomocniczego (Construction circles) -->
  <circle cx="250" cy="220" r="170" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 6"/>
  <circle cx="250" cy="220" r="140" fill="none" stroke="#0284c7" stroke-width="1" stroke-dasharray="12 4" opacity="0.6"/>
  
  <!-- Druga, lekko przesunięta obudowa (efekt szkicu ołówkiem) -->
  <circle cx="251" cy="221" r="140" fill="none" stroke="#38bdf8" stroke-width="2.5" opacity="0.9"/>
  <circle cx="249" cy="219" r="143" fill="none" stroke="#93c5fd" stroke-width="1" stroke-dasharray="40 10 5 10"/>

  <!-- Osiowe linie pomocnicze (Szkicowanie) -->
  <line x1="50" y1="220" x2="450" y2="220" stroke="#334155" stroke-width="1.5" stroke-dasharray="8 4"/>
  <line x1="250" y1="30" x2="250" y2="410" stroke="#334155" stroke-width="1.5" stroke-dasharray="8 4"/>
  <line x1="90" y1="60" x2="410" y2="380" stroke="#1e293b" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="90" y1="380" x2="410" y2="60" stroke="#1e293b" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Łopatki turbiny (12 sztuk w rozstawie co 30 stopni) -->
  <g id="turbine-fan">
    <use href="#blade"/>
    <use href="#blade" transform="rotate(30 250 220)"/>
    <use href="#blade" transform="rotate(60 250 220)"/>
    <use href="#blade" transform="rotate(90 250 220)"/>
    <use href="#blade" transform="rotate(120 250 220)"/>
    <use href="#blade" transform="rotate(150 250 220)"/>
    <use href="#blade" transform="rotate(180 250 220)"/>
    <use href="#blade" transform="rotate(210 250 220)"/>
    <use href="#blade" transform="rotate(240 250 220)"/>
    <use href="#blade" transform="rotate(270 250 220)"/>
    <use href="#blade" transform="rotate(300 250 220)"/>
    <use href="#blade" transform="rotate(330 250 220)"/>
  </g>

  <!-- Stożek piasty (Center Spinner) -->
  <!-- Zewnętrzny pierścień piasty -->
  <circle cx="250" cy="220" r="45" fill="#0f172a" stroke="#38bdf8" stroke-width="2.5"/>
  <circle cx="252" cy="221" r="45" fill="none" stroke="#93c5fd" stroke-width="1" opacity="0.7"/>
  
  <!-- Spiralny szkic na stożku piasty -->
  <path d="M 250 220 Q 255 200, 270 195 Q 280 210, 260 228 Q 235 230, 235 205 Q 260 180, 285 210" 
        fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>

  <!-- Akcenty edukacyjne / Szkicowe wymiarowanie (Aero Annotations) -->
  <!-- Łuk przepływu / obrotu z strzałką -->
  <path d="M 380 140 A 160 160 0 0 1 410 230" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <text x="420" y="180" fill="#f59e0b" font-family="monospace" font-size="12" font-weight="bold">RPM &#x21BB;</text>

  <!-- Kąt natarcia / Oznaczenie techniczne -->
  <path d="M 110 220 A 140 140 0 0 1 120 170" fill="none" stroke="#f43f5e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="75" y="195" fill="#f43f5e" font-family="monospace" font-size="11" font-weight="bold">&#x3B1; = 28&#xB0;</text>

  <!-- Linie do wymiarowania promienia -->
  <line x1="250" y1="220" x2="335" y2="105" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3 3"/>
  <circle cx="335" cy="105" r="3" fill="#f59e0b"/>
  <text x="300" y="145" fill="#f59e0b" font-family="monospace" font-size="11" font-weight="bold">R_max</text>

  <!-- Tekst / Nazwa aplikacji na dole w stylu bloku rysunku technicznego -->
  <g transform="translate(0, 395)">
    <!-- Poszerzona ramka blokowa, aby pomieścić nową nazwę -->
    <rect x="80" y="20" width="340" height="52" rx="8" fill="#1e293b" fill-opacity="0.85" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="140 4 8 4"/>
    
    <text x="250" y="43" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="17" font-weight="900" letter-spacing="2">INSIDE THE ENGINE</text>
    <text x="250" y="60" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9" letter-spacing="2.5">TURBINE LEARNING APP</text>
  </g>
</svg>
